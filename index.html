<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase v9 Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }
        .text-gradient {
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tab-button.active {
            border-bottom: 2px solid #FCD34D;
            color: #FCD34D;
        }
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px;
            border-radius: 8px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        .notification-toast.success { background: #10b981; color: white; }
        .notification-toast.error { background: #ef4444; color: white; }
        .notification-toast.info { background: #3b82f6; color: white; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

<body class="bg-black text-white">

    <!-- NOTIFICATION CONTAINER -->
    <div id="notification-container"></div>

    <!-- PUBLIC PAGE -->
    <div id="public-page"></div>

    <!-- MAIN ADMIN DASHBOARD -->
    <div id="main-admin-container"></div>

    <!-- BRANCH ADMIN DASHBOARD -->
    <div id="admin-container"></div>

    <!-- CUSTOMER DASHBOARD -->
    <div id="customer-container"></div>

    <!-- ============================================
         FIREBASE & GLOBAL SETUP
         ============================================ -->
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBW0egtlG4JXjkoWB2Lfu5GcYhZz_oEjbI",
            authDomain: "boni-lottery-8d0e6.firebaseapp.com",
            projectId: "boni-lottery-8d0e6",
            storageBucket: "boni-lottery-8d0e6.appspot.com",
            messagingSenderId: "479140405683",
            appId: "1:479140405683:web:20a2205ece9fdcdf076bc6",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;

        console.log('✅ Firebase initialized');
        console.log('✅ Firestore ready');

        // Notification System
        function notify(type, message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `notification-toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Logout Function
        function logout() {
            currentUser = null;
            document.getElementById('main-admin-container').innerHTML = '';
            document.getElementById('admin-container').innerHTML = '';
            document.getElementById('customer-container').innerHTML = '';
            document.getElementById('public-page').innerHTML = renderPublicPage();
            notify('success', '✅ Logged out');
        }

        // Render Public Page
        function renderPublicPage() {
            return `
                <div class="min-h-screen bg-black flex flex-col">
                    <header class="sticky top-0 z-40 w-full glass-panel border-b border-yellow-400/10 px-6 py-4">
                        <div class="max-w-7xl mx-auto flex items-center justify-between">
                            <h1 class="font-bold text-2xl text-gradient">🎰 LOTTERY TICKET</h1>
                            <button onclick="openLoginModal()" class="px-6 py-2 bg-yellow-400 text-black font-bold rounded-xl">Login</button>
                        </div>
                    </header>
                    <main class="flex-grow flex items-center justify-center p-6">
                        <div class="text-center">
                            <h2 class="text-5xl font-bold text-white mb-4">Welcome to Lottery Ticket</h2>
                            <p class="text-slate-400 mb-8 text-xl">Complete lottery management platform</p>
                            <button onclick="openLoginModal()" class="px-8 py-3 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-bold rounded-xl">Get Started →</button>
                        </div>
                    </main>
                </div>

                <!-- Login Modal -->
                <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
                    <div class="glass-panel rounded-2xl p-8 w-full max-w-md border border-yellow-400/10">
                        <h3 class="text-2xl font-bold text-white mb-6">Login</h3>
                        <div class="space-y-4">
                            <input type="email" id="login-email" placeholder="Email" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white placeholder-slate-500">
                            <input type="password" id="login-password" placeholder="Password" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white placeholder-slate-500">
                            <button onclick="handleLogin()" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-xl hover:bg-yellow-500">Login</button>
                            <button onclick="closeLoginModal()" class="w-full py-3 bg-slate-700 text-white rounded-xl hover:bg-slate-600">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function openLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.classList.remove('hidden');
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.classList.add('hidden');
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }

        async function handleLogin() {
    const email = document.getElementById('login-email')?.value.trim() || '';
    const password = document.getElementById('login-password')?.value || '';

    if (!email || !password) {
        notify('error', '❌ Fill all fields');
        return;
    }

    // 1. Main Admin Check
    if (email === 'fita.regassa@gmail.com' && password === 'MainAdmin@123') {
        currentUser = { type: 'main_admin', email };
        closeLoginModal();
        document.getElementById('public-page').innerHTML = '';
        
        if (!window.mainAdminDashboard) {
            window.mainAdminDashboard = new MainAdminDashboard();
        }
        document.getElementById('main-admin-container').innerHTML = window.mainAdminDashboard.render();
        await window.mainAdminDashboard.loadData();
        notify('success', '✅ Main Admin Login Successful');
        return;
    }

    // 2. Branch Admin Check
    if (email === 'ahmed@company.com' && password === 'Ahmed123') {
        currentUser = { type: 'admin', email };
        closeLoginModal();
        document.getElementById('public-page').innerHTML = '';
        
        if (!window.adminDashboard) {
            window.adminDashboard = new AdminDashboard(email);
        }
        document.getElementById('admin-container').innerHTML = window.adminDashboard.render();
        await window.adminDashboard.loadData();
        notify('success', '✅ Admin Login Successful');
        return;
    }

    // 3. Specific Customer Check (or validate against Firestore if customers register dynamically)
    if (email === 'm@email.com' && password === 'Pass123') {
        currentUser = { type: 'customer', email, name: email.split('@')[0] };
        closeLoginModal();
        document.getElementById('public-page').innerHTML = '';
        
        if (!window.customerDashboard) {
            window.customerDashboard = new CustomerDashboard(email);
        }
        document.getElementById('customer-container').innerHTML = window.customerDashboard.render();
        await window.customerDashboard.loadData();
        notify('success', '✅ Login Successful');
        return;
    }

    // 4. Block everything else if no match is found
    notify('error', '❌ Invalid email or password. User does not exist.');
}

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('public-page').innerHTML = renderPublicPage();
        });
    </script>

    <!-- ============================================
         LOAD COMPONENTS (WITH CORRECT PATHS FROM public/ FOLDER)
         ============================================ -->
    
    <!-- MAIN ADMIN COMPONENTS (Go up one level: ../) -->
    <script src="/MainAdmin/Admins.js"></script>
    <script src="/MainAdmin/Customers.js"></script>
    <script src="/MainAdmin/Ranges.js"></script>
    <script src="/MainAdmin/Payments.js"></script>
    <script src="/MainAdmin/Analytics.js"></script>
    <script src="/MainAdmin/Transactions.js"></script>
    <script src="/MainAdmin/AuditLog.js"></script>
    <script src="/MainAdmin/Notifications.js"></script>
    <script src="/MainAdmin/Settings.js"></script>

    <!-- BRANCH ADMIN COMPONENTS -->
<script src="/BranchAdmin/Notifications.js"></script>
<script src="/BranchAdmin/BookAppointment.js"></script>
<script src="/BranchAdmin/Payments.js"></script>
<script src="/BranchAdmin/Settings.js"></script>
<!-- Load Branch Admin Main Dashboard -->
    <script src="/BranchAdmin/AdminDashboard.js"></script>

    <!-- CUSTOMER COMPONENTS -->
    <script src="/Customer/CustomerDashboard.js"></script>

    <!-- MAIN ADMIN DASHBOARD (LAST) -->
    <script src="/MainAdmin/MainAdminDashboard.js"></script>

</body>
</html>
