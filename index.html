<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boni Lottery - Master Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020c1b; color: #e2e8f0; }
        .glass-panel { background: rgba(15, 39, 61, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(200, 184, 123, 0.08); }
        .tab-button.active { border-bottom: 2px solid #FCD34D; color: #FCD34D; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="notification-container" class="fixed top-5 right-5 z-50"></div>

    <div id="app-container" class="min-h-screen">
        <!-- Login UI -->
        <div id="public-page" class="p-10 text-center space-y-4">
            <h1 class="text-3xl font-bold text-yellow-400">Boni Lottery Admin</h1>
            <input type="email" id="login-email" placeholder="Email" class="block mx-auto p-2 rounded bg-gray-900 border border-gray-700 text-white">
            <input type="password" id="login-password" placeholder="Password" class="block mx-auto p-2 rounded bg-gray-900 border border-gray-700 text-white">
            <button onclick="handleLogin()" class="bg-yellow-600 px-6 py-2 rounded font-bold">Login</button>
        </div>
        
        <div id="dashboards-container"></div>
    </div>

    <script>
        // --- 1. SHARED DATA STORAGE ---
        const db = {
            storage: JSON.parse(localStorage.getItem('boni_db') || '{}'),
            save() { localStorage.setItem('boni_db', JSON.stringify(this.storage)); },
            getSettings() { return this.storage.settings || { price: 100, drawDay: 'Sunday' }; },
            updateSettings(data) { this.storage.settings = { ...this.getSettings(), ...data }; this.save(); }
        };

        // --- 2. PARENT DASHBOARD: MAIN ADMIN ---
        class MainAdminDashboard {
            render() {
                return `
                    <div class="p-6">
                        <h2 class="text-2xl font-bold mb-4">System Control Center</h2>
                        <nav class="flex gap-4 border-b border-white/10 mb-4">
                            <button onclick="switchTab('main', 'settings')" class="tab-button active">Settings</button>
                            <button onclick="switchTab('main', 'admins')" class="tab-button">Admins</button>
                        </nav>
                        <div id="main-settings" class="tab-content active"></div>
                        <div id="main-admins" class="tab-content"></div>
                    </div>
                `;
            }
        }

        // --- 3. CHILD COMPONENT: MAIN ADMIN SETTINGS ---
        class MainAdminSettings {
            render() {
                const settings = db.getSettings();
                return `
                    <div class="glass-panel p-6 rounded-xl">
                        <h3 class="font-bold mb-4">System Configuration</h3>
                        <label>Ticket Price (ETB)</label>
                        <input type="number" id="price-input" value="${settings.price}" class="block bg-gray-900 p-2 rounded mb-4">
                        <button onclick="saveSettings()" class="bg-yellow-600 px-4 py-2 rounded">Save Settings</button>
                    </div>
                `;
            }
        }

        // --- 4. NAVIGATION & LOGIN LOGIC ---
        function switchTab(role, tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(`${role}-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        function saveSettings() {
            const price = document.getElementById('price-input').value;
            db.updateSettings({ price });
            alert('Saved!');
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            if(email === 'fita.regassa@gmail.com') {
                document.getElementById('public-page').style.display = 'none';
                const dash = new MainAdminDashboard();
                document.getElementById('dashboards-container').innerHTML = dash.render();
                
                // Initialize Child
                document.getElementById('main-settings').innerHTML = new MainAdminSettings().render();
            } else {
                alert('Invalid Credentials');
            }
        }
    </script>
</body>
</html>
