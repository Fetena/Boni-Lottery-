<!-- ============================================
     GLOBAL SCRIPTS - LOAD IN ORDER
     ============================================ -->

<!-- Firebase Config & Init -->
<script>
    let db, currentUser;
    
    const firebaseConfig = {
        apiKey: "AIzaSyBW0egtlG4JXjkoWB2Lfu5GcYhZz_oEjbI",
        authDomain: "boni-lottery-8d0e6.firebaseapp.com",

<!-- Utility Functions -->
<script>
    // Notification system
    function notify(type, message) {
        const notif = document.getElementById('notification');
        notif.textContent = message;
        notif.className = `fixed top-4 right-4 px-6 py-3 rounded-xl glass-panel z-50 ${
            type === 'success' ? 'bg-green-500/20 text-green-400' :
            type === 'error' ? 'bg-red-500/20 text-red-400' :
            'bg-blue-500/20 text-blue-400'
        }`;
        notif.classList.remove('hidden');
        setTimeout(() => notif.classList.add('hidden'), 3000);
    }

    // Logout
    function logout() {
        currentUser = null;
        document.getElementById('main-admin-container').innerHTML = '';
        document.getElementById('admin-container').innerHTML = '';
        document.getElementById('customer-container').innerHTML = '';
        document.getElementById('public-page-container').innerHTML = renderPublicPage();
        notify('success', 'Logged out successfully');
    }
</script>

<!-- Component Classes (Child Components First) -->
<script src="components/Admins.js"></script>

<!-- Dashboard Classes (Parent Components) -->

<script src="dashboards/AdminDashboard.js"></script>
<script src="dashboards/CustomerDashboard.js"></script>

<!-- Public Page & Login -->
<script>
    function renderPublicPage() {
        return `
            <div class="min-h-screen bg-black flex flex-col">
                <nav class="glass-panel border-b border-yellow-400/10 px-6 py-4">
                    <div class="max-w-7xl mx-auto flex items-center justify-between">
                        <h1 class="font-bold text-2xl text-gradient">🎰 BONI LOTTERY</h1>
                        <button onclick="openLoginModal()" class="px-6 py-2 bg-yellow-400 text-black font-bold rounded-xl">Login</button>
                    </div>
                </nav>
                
                <main class="flex-grow flex items-center justify-center p-6">
                    <div class="text-center">
                        <h2 class="text-4xl font-bold text-white mb-4">Welcome to BONI Lottery</h2>
                        <p class="text-slate-400 mb-8">Select numbers, win big prizes</p>
                        <button onclick="openLoginModal()" class="px-8 py-3 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-bold rounded-xl">Get Started</button>
                    </div>
                </main>
            </div>

            <!-- Login Modal -->
            <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
                <div class="glass-panel rounded-2xl p-8 w-full max-w-md border border-yellow-400/10">
                    <h3 class="text-2xl font-bold text-white mb-6">Login</h3>
                    <div class="space-y-4">
                        <input type="email" id="login-email" placeholder="Email" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white">
                        <input type="password" id="login-password" placeholder="Password" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white">
                        <button onclick="handleLogin()" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-xl">Login</button>
                        <button onclick="closeLoginModal()" class="w-full py-3 bg-slate-700 text-white rounded-xl">Cancel</button>
                    </div>
                </div>
            </div>
        `;
    }

    function openLoginModal() {
        const modal = document.getElementById('login-modal');
        if (!modal) {
            // Create modal if it doesn't exist
            const div = document.createElement('div');
            div.id = 'login-modal';
            div.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50';
            div.innerHTML = `...`;
            document.body.appendChild(div);
        } else {
            modal.classList.remove('hidden');
        }
    }

    function closeLoginModal() {
        const modal = document.getElementById('login-modal');
        if (modal) modal.classList.add('hidden');
    }

    async function handleLogin() {
        const email = document.getElementById('login-email')?.value || '';
        const password = document.getElementById('login-password')?.value || '';

        if (!email || !password) {
            notify('error', '❌ Fill all fields');
            return;
        }

        // Main Admin Login
        if (email === 'fita.regassa@gmail.com' && password === 'MainAdmin@123') {
            currentUser = { type: 'main_admin', email };
            closeLoginModal();
            document.getElementById('public-page-container').innerHTML = '';
            
            if (!window.mainAdminDashboard) {
                window.mainAdminDashboard = new MainAdminDashboard();
            }
            document.getElementById('main-admin-container').innerHTML = window.mainAdminDashboard.render();
            await window.mainAdminDashboard.loadData();
            notify('success', '✅ Main Admin Login Successful');
            return;
        }

        // Branch Admin Login
        if (email === 'ahmed@company.com' && password === 'Admin@123') {
            currentUser = { type: 'admin', email };
            closeLoginModal();
            document.getElementById('public-page-container').innerHTML = '';
            
            if (!window.adminDashboard) {
                window.adminDashboard = new AdminDashboard(email);
            }
            document.getElementById('admin-container').innerHTML = window.adminDashboard.render();
            await window.adminDashboard.loadData();
            notify('success', '✅ Admin Login Successful');
            return;
        }

        // Customer Login
        currentUser = { type: 'customer', email, name: email.split('@')[0] };
        closeLoginModal();
        document.getElementById('public-page-container').innerHTML = '';
        
        if (!window.customerDashboard) {
            window.customerDashboard = new CustomerDashboard(email);
        }
        document.getElementById('customer-container').innerHTML = window.customerDashboard.render();
        await window.customerDashboard.loadData();
        notify('success', '✅ Login Successful');
    }
</script>

<!-- Initialize App -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('public-page-container').innerHTML = renderPublicPage();
    });
</script>

<!-- Styles -->
<style>
    .glass-panel {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    
    .text-gradient {
        background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .tab-button.active {
        border-bottom: 2px solid #FCD34D;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
</style>

</body>
</html>
