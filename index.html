    <style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }
        .text-gradient {
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tab-button.active {
            border-bottom: 2px solid #FCD34D;
            color: #FCD34D;
        }
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px;
            border-radius: 8px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        .notification-toast.success { background: #10b981; color: white; }
        .notification-toast.error { background: #ef4444; color: white; }
        .notification-toast.info { background: #3b82f6; color: white; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

<body class="bg-black text-white">

    <!-- NOTIFICATION CONTAINER -->
    <div id="notification-container"></div>

    <!-- PUBLIC PAGE -->

    <!-- CUSTOMER DASHBOARD -->

    <!-- ============================================
         FIREBASE & GLOBAL SETUP
         ============================================ -->
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBW0egtlG4JXjkoWB2Lfu5GcYhZz_oEjbI",
            authDomain: "boni-lottery-8d0e6.firebaseapp.com",
            projectId: "boni-lottery-8d0e6",
            storageBucket: "boni-lottery-8d0e6.appspot.com",
            messagingSenderId: "479140405683",
            appId: "1:479140405683:web:20a2205ece9fdcdf076bc6",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;

        console.log('✅ Firebase initialized');
        console.log('✅ Firestore ready');

        // Notification System
        function notify(type, message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `notification-toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Logout Function
        function logout() {
            currentUser = null;
            document.getElementById('main-admin-container').innerHTML = '';
            document.getElementById('admin-container').innerHTML = '';
            document.getElementById('customer-container').innerHTML = '';
            document.getElementById('public-page').innerHTML = renderPublicPage();
            notify('success', '✅ Logged out');
        }

        // Render Public Page
        function renderPublicPage() {
            return `
                <div class="min-h-screen bg-black flex flex-col">
                    <header class="sticky top-0 z-40 w-full glass-panel border-b border-yellow-400/10 px-6 py-4">
                        <div class="max-w-7xl mx-auto flex items-center justify-between">
                            <h1 class="font-bold text-2xl text-gradient">🎰 LOTTERY TICKET</h1>
                            <div class="space-x-2">
                                <button onclick="openLoginModal()" class="px-4 py-2 bg-transparent border border-yellow-400 text-yellow-400 font-bold rounded-xl text-xs">Login</button>
                                <button onclick="openSignupModal()" class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-xl text-xs">Sign Up</button>
                            </div>
                        </div>
                    </header>
                    <main class="flex-grow flex items-center justify-center p-6">
                        <div class="text-center">
                            <h2 class="text-5xl font-bold text-white mb-4">Welcome to Lottery Ticket</h2>
                            <p class="text-slate-400 mb-8 text-xl">Complete lottery management platform</p>
                            <button onclick="openSignupModal()" class="px-8 py-3 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-bold rounded-xl">Get Started →</button>
                        </div>
                    </main>
                </div>

                <!-- Login Modal -->
                <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
                    <div class="glass-panel rounded-2xl p-8 w-full max-w-md border border-yellow-400/10 space-y-4">
                        <h3 class="text-2xl font-bold text-white mb-2">Login</h3>
                        <input type="email" id="login-email" placeholder="Email" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white text-xs placeholder-slate-500">
                        <input type="password" id="login-password" placeholder="Password" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 text-white text-xs placeholder-slate-500">
                        <button onclick="handleLogin()" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-xl text-xs hover:bg-yellow-500">Login</button>
                        <button onclick="closeLoginModal()" class="w-full py-2 bg-slate-800 text-slate-300 rounded-xl text-xs">Cancel</button>
                    </div>
                </div>

                <!-- Sign Up Modal -->
                <div id="signup-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 overflow-y-auto py-10">
                    <div class="glass-panel rounded-2xl p-8 w-full max-w-md border border-yellow-400/10 space-y-3">
                        <h3 class="text-2xl font-bold text-white mb-2">Customer Sign Up</h3>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Full Name</label>
                            <input type="text" id="signup-name" placeholder="John Doe" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-2 px-4 text-white text-xs">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Email</label>
                            <input type="email" id="signup-email" placeholder="customer@email.com" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-2 px-4 text-white text-xs">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Password</label>
                            <input type="password" id="signup-password" placeholder="••••••••" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-2 px-4 text-white text-xs">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Phone Number</label>
                            <input type="tel" id="signup-phone" placeholder="0912345678" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-2 px-4 text-white text-xs">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Choose Preferred Admin / Branch</label>
                            <select id="signup-admin-select" class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-2 px-4 text-white text-xs">
                                <option value="">-- Loading Admins --</option>
                            </select>
                        </div>
                        <button onclick="registerNewCustomer()" class="w-full py-3 bg-yellow-400 text-black font-bold rounded-xl text-xs hover:bg-yellow-500 mt-2">Register Account</button>
                        <button onclick="closeSignupModal()" class="w-full py-2 bg-slate-800 text-slate-300 rounded-xl text-xs">Cancel</button>
                    </div>
                </div>
            `;
        }

        function openSignupModal() {
            const modal = document.getElementById('signup-modal');
            if (modal) modal.classList.remove('hidden');
            loadAdminsForSignup();
        }

        function closeSignupModal() {
            const modal = document.getElementById('signup-modal');
            if (modal) modal.classList.add('hidden');
        }

        function openLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.classList.remove('hidden');
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            if (modal) modal.classList.add('hidden');
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }
async function loadAdminsForSignup() {
            if (!db) return;
            try {
                const snapshot = await db.collection('admins').get();
                const admins = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                const signupSelect = document.getElementById('signup-admin-select');
                if (signupSelect) {
                    signupSelect.innerHTML = '<option value="">-- Choose Admin --</option>' + 
                        admins.map(admin => `<option value="${admin.email}">${admin.name || admin.email}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading admins for signup:', error);
            }
        }

        async function registerNewCustomer() {
            const nameEl = document.getElementById('signup-name');
            const emailEl = document.getElementById('signup-email');
            const passwordEl = document.getElementById('signup-password');
            const phoneEl = document.getElementById('signup-phone');
            const adminSelectEl = document.getElementById('signup-admin-select');

            const name = nameEl?.value.trim();
            const email = emailEl?.value.trim();
            const password = passwordEl?.value;
            const phone = phoneEl?.value.trim();
            const preferredAdmin = adminSelectEl?.value;

            if (!name || !email || !password || !phone || !preferredAdmin) {
                notify('error', '❌ Please fill in all fields and select an admin');
                return;
            }

            try {
                // 1. Create account using Firebase Auth
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                // 2. Save customer details and chosen preferred admin to Firestore
                await db.collection('customer_settings').doc(email).set({
                    customerEmail: email,
                    customerName: name,
                    phone: phone,
                    preferredAdmin: preferredAdmin,
                    preferredPayment: 'Telebirr',
                    role: 'customer',
                    createdAt: new Date()
                });

                notify('success', '🎉 Registration successful! Welcome.');
                closeSignupModal();

                // 3. Log user in and open customer dashboard automatically
                currentUser = { type: 'customer', email, name };
                document.getElementById('public-page').innerHTML = '';
                
                if (!window.customerDashboard) {
                    window.customerDashboard = new CustomerDashboard(email);
                }
                document.getElementById('customer-container').innerHTML = window.customerDashboard.render();
                await window.customerDashboard.loadData();

            } catch (error) {
                notify('error', `❌ Registration Error: ${error.message}`);
            }
        }
       async function handleLogin() {
    const email = document.getElementById('login-email')?.value.trim() || '';
    const password = document.getElementById('login-password')?.value || '';

    if (!email || !password) {
        notify('error', '❌ Fill all fields');
        return;
    }

    // 1. Main Admin Check
    if (email === 'fita.regassa@gmail.com' && password === 'MainAdmin@123') {
        currentUser = { type: 'main_admin', email };
        closeLoginModal();
        document.getElementById('public-page').innerHTML = '';
        
        if (!window.mainAdminDashboard) {
            window.mainAdminDashboard = new MainAdminDashboard();
        }
        document.getElementById('main-admin-container').innerHTML = window.mainAdminDashboard.render();
        await window.mainAdminDashboard.loadData();
        notify('success', '✅ Main Admin Login Successful');
        return;
    }

    // 2. Branch Admin Check
    if (email === 'ahmed@company.com' && password === 'Ahmed123') {
        currentUser = { type: 'admin', email };
        closeLoginModal();
        document.getElementById('public-page').innerHTML = '';
        
        if (!window.adminDashboard) {
            window.adminDashboard = new AdminDashboard(email);
        }
        document.getElementById('admin-container').innerHTML = window.adminDashboard.render();
        await window.adminDashboard.loadData();
        notify('success', '✅ Admin Login Successful');
        return;
    }

    // 3. Dynamic Customer Check via Firebase Auth & Firestore
    try {
        // Authenticate the user with Firebase Auth
        await firebase.auth().signInWithEmailAndPassword(email, password);

        // Check if the user exists in the customer_settings collection
        const customerDoc = await db.collection('customer_settings').doc(email).get();
        
        if (customerDoc.exists) {
            const customerData = customerDoc.data();
            currentUser = { type: 'customer', email, name: customerData.customerName || email.split('@')[0] };
            
            closeLoginModal();
            document.getElementById('public-page').innerHTML = '';
            
            if (!window.customerDashboard) {
                window.customerDashboard = new CustomerDashboard(email);
            }
            document.getElementById('customer-container').innerHTML = window.customerDashboard.render();
            await window.customerDashboard.loadData();
            notify('success', '✅ Login Successful');
            return;
        }
    } catch (error) {
        console.log('Not a customer or auth failed:', error.message);
    }

    // 4. Block everything else if no match is found
    notify('error', '❌ Invalid email or password. User does not exist.');
}

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('public-page').innerHTML = renderPublicPage();
        });
    </script>
