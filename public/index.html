<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boni Lottery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .glass-panel { background: rgba(15, 39, 61, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(200, 184, 123, 0.08); }
    </style>
</head>
<body class="h-full font-sans antialiased">

    <div id="app-wrapper" class="h-full w-full">
        
        <div id="public-platform">
            <h1>Public Lottery Page</h1>
        </div>

        <div id="admin-dashboard-view" class="hidden">
            <h1>Admin Dashboard</h1>
        </div>
    </div>

    <div id="admin-login-modal" class="fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center hidden">
        <div class="glass-panel p-8 rounded-xl w-96">
            <input type="email" id="admin-email" placeholder="Email" class="w-full p-2 mb-2 bg-slate-800 rounded">
            <input type="password" id="admin-password" placeholder="Password" class="w-full p-2 mb-4 bg-slate-800 rounded">
            <button onclick="handleLoginAttempt()" class="w-full bg-yellow-600 p-2 rounded">Login</button>
            <div id="login-error" class="text-red-500 mt-2 text-sm hidden"></div>
        </div>
    </div>

    <script>
        // CORE LOGIC: This ensures the page doesn't break
        function switchView(viewId) {
            document.getElementById('public-platform').classList.add('hidden');
            document.getElementById('admin-dashboard-view').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        async function handleLoginAttempt() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                // Check if the external function exists
                if (typeof window.simpleAdminLogin === 'function') {
                    await window.simpleAdminLogin(email, password);
                    document.getElementById('admin-login-modal').classList.add('hidden');
                    switchView('admin-dashboard-view');
                } else {
                    throw new Error("Login system not loaded yet.");
                }
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
    
    <script src="simple-admin.js"></script>
</body>
</html>
