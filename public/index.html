<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boni Lottery Platform - Secure, Transparent & Provably Fair</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <style>
        .glass-panel { background: rgba(15, 39, 61, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(200, 184, 123, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #FFF 30%, #C8B87B 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="h-full font-sans antialiased bg-brand-navyback text-slate-100 flex flex-col">

    <header class="sticky top-0 z-40 w-full glass-panel border-b border-brand-gold/10 px-4 py-3.5">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <span class="font-serif font-bold text-xl text-gradient">BONI</span>
            <nav class="flex items-center space-x-2 bg-brand-navy/60 p-1 rounded-2xl border border-brand-gold/5">
                <button onclick="switchTab('home')" class="px-3 py-2 text-sm font-semibold rounded-xl text-brand-gold">Home</button>
                <button onclick="switchTab('play')" class="px-3 py-2 text-sm font-semibold rounded-xl text-slate-400">Play Grid</button>
                <button onclick="switchTab('dashboard')" class="px-3 py-2 text-sm font-semibold rounded-xl text-slate-400">Dashboard</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto p-6">
        <section id="view-dashboard" class="space-y-8 hidden">
            <div>
                <h2 class="font-serif text-3xl font-bold">Verification Dashboard</h2>
            </div>

            <div id="dashboard-empty-state" class="text-center py-20 border border-dashed border-slate-700 rounded-3xl">
                <i class="fa-solid fa-ticket text-4xl text-slate-600 mb-4"></i>
                <h3 class="text-xl font-bold text-slate-400">No active tickets</h3>
                <p class="text-sm text-slate-500 mt-2">Select your lucky numbers on the Play Grid to begin.</p>
            </div>

            <div id="verification-area" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-5 glass-panel rounded-3xl p-6">
                        <h3 class="text-lg font-bold">Transfer Ticket Cost</h3>
                        </div>
                    
                    <form id="verification-receipt-form" class="lg:col-span-7 glass-panel rounded-3xl p-6 space-y-6">
                        <h3 class="text-lg font-bold">Submit Verification</h3>
                        </form>
                </div>
            </div>
        </section>
    </main>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
        }

        // New Logic to reveal the form
        function proceedToVerification() {
            switchTab('dashboard');
            document.getElementById('verification-area').classList.remove('hidden');
            document.getElementById('dashboard-empty-state').classList.add('hidden');
            
            // Smooth scroll to the form
            document.getElementById('verification-area').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
