async function handleAuthSubmit(event, mode) {
  event.preventDefault();
  const errorDiv = document.getElementById('auth-error-message');
  errorDiv.classList.add('hidden');

  try {
    if (mode === 'login') {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('auth-login-btn');

      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Signing in...`;

      await window.firebaseIntegration.loginUser(email, password);
      showNotificationToast(`Welcome back, ${email}!`);
      document.getElementById('auth-modal').classList.add('hidden');

      btn.disabled = false;
      btn.innerHTML = `Sign In to Boni`;
      
    } else if (mode === 'signup') {
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;

      if (password !== passwordConfirm) {
        throw new Error("Passwords do not match!");
      }

      const btn = document.getElementById('auth-signup-btn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Creating...`;

      await window.firebaseIntegration.signUpUser(email, password);
      showNotificationToast(`Account created! Welcome to Boni!`);
      document.getElementById('auth-modal').classList.add('hidden');

      btn.disabled = false;
      btn.innerHTML = `Create My Account`;
    }
  } catch (error) {
    errorDiv.classList.remove('hidden');
    errorDiv.textContent = error.message || "Authentication failed!";
    console.error(error);
  }
}

  if (confirm("Sign out from Boni?")) {
    await window.firebaseIntegration.logoutUser();

/* Updated verification submit - saves to Firestore with customer info */
async function handleVerificationSubmit(event) {
  event.preventDefault();

  if (selectedNumbers.length === 0) {
    showNotificationToast("No numbers selected!", "error");
    return;
  }

  const totalCost = selectedNumbers.length * ticketPrice;
  const numbersString = selectedNumbers.map(n => String(n).padStart(3, '0')).join(', ');
  const generatedTicketId = 'T' + Date.now().toString().slice(-6);

  const submitBtn = document.getElementById('submit-verification-btn');
  submitBtn.disabled = true;
  submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Submitting...`;

  try {
    const transInput = document.getElementById('transaction-id-input');
    const transId = transInput.value.trim().toUpperCase();

    if (!transId) {
      showNotificationToast("Please enter transaction reference ID!", "error");
      submitBtn.disabled = false;
      submitBtn.innerHTML = `<i class="fa-solid fa-shield-check mr-1.5"></i>Submit Verification`;
      return;
    }

    // Save to Firestore with customer info
    const ticketData = {
      ticketId: generatedTicketId,
      numbers: selectedNumbers,
      transactionId: transId,
      totalCost: totalCost,
      status: 'Verifying'
    };

    const docId = await window.guestTicketing.saveTicketToFirestore(ticketData);

    // Upload screenshot if available
    if (TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID && currentVerificationTicket) {
      try {
        const customerInfo = window.guestTicketing.getCurrentCustomerInfo();
        const captionText = `📸 Payment Receipt\nTicket: ${generatedTicketId}\nCustomer: ${customerInfo.name}`;

        const botUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`;
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CHAT_ID);
        formData.append('photo', currentVerificationTicket);
        formData.append('caption', captionText);

        await fetch(botUrl, { method: 'POST', body: formData });
      } catch (err) {
        console.warn("Screenshot upload skipped");
      }
    }

    // Clear
    selectedNumbers = [];
    resetFileSelection(null);
    updateSelectionDrawerUI();
    generateSelectionGrid();
    transInput.value = '';

    showNotificationToast(`✅ Ticket submitted! ID: ${generatedTicketId}`);

  } catch (error) {
    showNotificationToast("Failed to submit: " + error.message, "error");
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = `<i class="fa-solid fa-shield-check mr-1.5"></i>Submit Verification`;
  }
}

/* Updated draw execution */
async function executeProvablyFairDraw() {
  const serverSeed = document.getElementById('draw-server-seed').value;
  const clientSeed = document.getElementById('draw-client-seed').value || "BoniLotteryLiveDraw";
  const triggerBtn = document.getElementById('trigger-draw-btn');

  triggerBtn.disabled = true;
  triggerBtn.innerHTML = `<i class="fa-solid fa-arrows-spin animate-spin mr-1.5"></i>Running...`;

  const combinedMessage = `${serverSeed}-${clientSeed}`;
  const hashHex = await calculateSHA256(combinedMessage);

  const subHashHex = hashHex.substring(0, 8);
  const decimalValue = parseInt(subHashHex, 16);
  const winningNumber = decimalValue % 1000;
  const winningString = String(winningNumber).padStart(3, '0');

  const digit0 = document.getElementById('digit-reel-0');
  const digit1 = document.getElementById('digit-reel-1');
  const digit2 = document.getElementById('digit-reel-2');

  let steps = 0;
  const maxSteps = 25;
  const interval = setInterval(() => {
    digit0.innerHTML = Math.floor(Math.random() * 10);
    digit1.innerHTML = Math.floor(Math.random() * 10);
    digit2.innerHTML = Math.floor(Math.random() * 10);
    steps++;

    if (steps >= maxSteps) {
      clearInterval(interval);
      
      digit0.innerHTML = winningString[0];
      digit1.innerHTML = winningString[1];
      digit2.innerHTML = winningString[2];

      const auditPreview = document.getElementById('audit-equation-preview');
      auditPreview.innerHTML = 
        `Server Seed:\n${serverSeed}\n\n` +
        `Client Seed:\n${clientSeed}\n\n` +
        `Hash SHA-256:\n${hashHex}\n\n` +
        `Result => [${winningString}]`;

      // Save to Firestore
      window.guestTicketing.saveDraw(winningNumber);

      triggerBtn.disabled = false;
      triggerBtn.innerHTML = `<i class="fa-solid fa-circle-play mr-1.5"></i>Simulate Draw`;
      showNotificationToast(`Draw Result: #${winningString}`);
    }
  }, 80);
}

/* Updated subscription handler */
async function handleDrawSubscription(event) {
  event.preventDefault();
  const btn = document.getElementById('sub-btn');
  const name = document.getElementById('notify-name').value;
  const contact = document.getElementById('notify-contact').value;
  
  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Subscribing...`;

  try {
    const msg = `🔔 NEW SUBSCRIPTION\nName: ${name}\nContact: ${contact}\nDate: ${new Date().toLocaleString()}`;

    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: msg,
        parse_mode: 'Markdown'
      })
    });

    showNotificationToast("✅ Subscribed to draw alerts!");
    document.getElementById('notify-name').value = '';
    document.getElementById('notify-contact').value = '';
  } catch (err) {
    showNotificationToast("Subscription failed - try again", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `Register for Alerts`;
  }
}
