<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boni Lottery Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background: #020c1b; color: #e2e8f0; }
        .glass-panel { background: rgba(15, 39, 61, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(200, 184, 123, 0.08); }
        .text-gradient { background: linear-gradient(135deg, #FFF 30%, #C8B87B 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="antialiased">

    <!-- PUBLIC PAGE -->
    <div id="public-page" class="min-h-screen flex flex-col">
        <header class="glass-panel border-b border-yellow-400/10 px-6 py-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-black">
                        <i class="fa-solid fa-trophy"></i>
                    </div>
                    <span class="text-xl text-yellow-400 font-bold">BONI LOTTERY</span>
                </div>
                <button onclick="showLoginModal()" class="px-6 py-2 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-bold rounded-xl">Login</button>
            </div>
        </header>
        <main class="flex-grow p-6 text-center">
            <h1 class="text-5xl font-bold text-white mt-20">Multi-Branch <span class="text-yellow-400">Lottery System</span></h1>
        </main>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center p-4 hidden">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full border border-yellow-400/20">
            <h2 class="text-2xl font-bold text-white text-center mb-6">Login</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" placeholder="Email" required class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 outline-none">
                <input type="password" placeholder="Password" required class="w-full bg-black/40 border border-yellow-400/20 rounded-xl py-3 px-4 outline-none">
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-bold rounded-xl">Login</button>
            </form>
            <button onclick="closeLoginModal()" class="w-full mt-4 text-slate-400 text-xs">Close</button>
        </div>
    </div>

    <!-- CUSTOMER DASHBOARD (Role: User) -->
    <div id="customer-dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold text-white mb-6">Customer Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="font-bold text-yellow-400 mb-2">Library</h3>
                <ul class="text-sm space-y-2 text-slate-400"><li>Lottery Rules</li><li>How to Play</li><li>FAQ</li></ul>
            </div>
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="font-bold text-yellow-400 mb-2">My Tickets</h3>
                <button class="w-full py-2 bg-yellow-400/10 text-yellow-400 rounded-lg">Buy New Ticket</button>
            </div>
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="font-bold text-yellow-400 mb-2">Appointments</h3>
                <button class="w-full py-2 bg-yellow-400/10 text-yellow-400 rounded-lg">Book Support</button>
            </div>
        </div>
    </div>

    <!-- BRANCH ADMIN DASHBOARD (Role: Sub-Admin) -->
    <div id="admin-dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold text-white mb-6">Branch Admin Panel</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button class="p-4 bg-yellow-400/10 rounded-xl text-yellow-400 font-bold border border-yellow-400/20">💳 Payments</button>
            <button class="p-4 bg-yellow-400/10 rounded-xl text-yellow-400 font-bold border border-yellow-400/20">🎫 Tickets</button>
            <button class="p-4 bg-yellow-400/10 rounded-xl text-yellow-400 font-bold border border-yellow-400/20">👥 Customers</button>
            <button class="p-4 bg-yellow-400/10 rounded-xl text-yellow-400 font-bold border border-yellow-400/20">📊 Revenue</button>
        </div>
    </div>

    <!-- MAIN ADMIN DASHBOARD (Role: Main-Admin) -->
    <div id="main-admin-dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold text-gradient mb-6">Main Admin Control Center</h2>
        <div class="glass-panel p-6 rounded-2xl border border-yellow-400/20">
            <h3 class="text-lg font-bold text-white mb-4">Platform Master Controls</h3>
            <div class="space-y-4">
                <button class="w-full p-3 bg-yellow-400/10 text-white rounded-lg text-left">🎯 Set Ticket Ranges (Admin Allocation)</button>
                <button class="w-full p-3 bg-yellow-400/10 text-white rounded-lg text-left">👤 Manage Branch Admins</button>
                <button class="w-full p-3 bg-yellow-400/10 text-white rounded-lg text-left">📢 Global Notifications</button>
                <button class="w-full p-3 bg-yellow-400/10 text-white rounded-lg text-left">⚙️ System Settings</button>
            </div>
        </div>
    </div>

    <script>
        function showLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
