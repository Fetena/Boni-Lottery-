        /* ========== AUTHENTICATION FUNCTIONS ========== */

function switchAuthMode(mode) {
  const loginForm = document.getElementById('auth-login-form');
  const signupForm = document.getElementById('auth-signup-form');
  const loginBtn = document.getElementById('auth-mode-login');
  const signupBtn = document.getElementById('auth-mode-signup');

  if (mode === 'login') {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    loginBtn.className = "flex-1 py-2 rounded-lg text-xs font-bold text-brand-gold bg-brand-navycard/85 transition-all duration-150";
    signupBtn.className = "flex-1 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all duration-150";
  } else {
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    signupBtn.className = "flex-1 py-2 rounded-lg text-xs font-bold text-brand-gold bg-brand-navycard/85 transition-all duration-150";
    loginBtn.className = "flex-1 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all duration-150";
  }
}

async function handleAuthSubmit(event, mode) {
  event.preventDefault();
  const errorDiv = document.getElementById('auth-error-message');
  errorDiv.classList.add('hidden');

  try {
    if (mode === 'login') {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('auth-login-btn');

      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Signing in...`;

      await window.firebaseIntegration.loginUser(email, password);
      showNotificationToast(`Welcome back, ${email}!`);
      document.getElementById('auth-modal').classList.add('hidden');

      btn.disabled = false;
      btn.innerHTML = `Sign In to Boni`;
      
    } else if (mode === 'signup') {
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;

      if (password !== passwordConfirm) {
        throw new Error("Passwords do not match!");
      }

      const btn = document.getElementById('auth-signup-btn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Creating...`;

      await window.firebaseIntegration.signUpUser(email, password);
      showNotificationToast(`Account created! Welcome to Boni!`);
      document.getElementById('auth-modal').classList.add('hidden');

      btn.disabled = false;
      btn.innerHTML = `Create My Account`;
    }
  } catch (error) {
    errorDiv.classList.remove('hidden');
    errorDiv.textContent = error.message || "Authentication failed!";
    console.error(error);
  }
}

async function handleLogout() {
  if (confirm("Sign out from Boni?")) {
    await window.firebaseIntegration.logoutUser();
    showNotificationToast("You have been signed out.");
  }
}

/* Update UI based on auth state */
function updateAuthUI(isLoggedIn) {
  const authModal = document.getElementById('auth-modal');
  const userMenu = document.getElementById('user-menu');
  const userEmailDisplay = document.getElementById('user-email-display');

  if (isLoggedIn) {
    authModal.classList.add('hidden');
    if (userMenu) userMenu.classList.remove('hidden');
    
    const currentUser = window.firebaseIntegration.getCurrentUser ? 
      window.firebaseIntegration.getCurrentUser() : null;
    
    if (currentUser && userEmailDisplay) {
      userEmailDisplay.textContent = currentUser.email;
    }
  } else {
    authModal.classList.remove('hidden');
    if (userMenu) userMenu.classList.add('hidden');
  }
}

/* Update handleVerificationSubmit to save to Firestore */
async function handleVerificationSubmitUpdated(event) {
  event.preventDefault();

  if (selectedNumbers.length === 0) {
    showNotificationToast("No numbers selected!", "error");
    return;
  }

  const totalCost = selectedNumbers.length * ticketPrice;
  const numbersString = selectedNumbers.map(n => String(n).padStart(3, '0')).join(', ');
  const generatedTicketId = 'T' + Date.now().toString().slice(-6);

  const submitBtn = document.getElementById('submit-verification-btn');
  submitBtn.disabled = true;
  submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i>Submitting...`;

  try {
    const transInput = document.getElementById('transaction-id-input');
    const transId = transInput.value.trim().toUpperCase();

    // Save to Firestore instead of localStorage
    const ticketData = {
      ticketId: generatedTicketId,
      numbers: selectedNumbers,
      transactionId: transId,
      totalCost: totalCost,
      status: 'Verifying'
    };

    const docId = await window.firebaseIntegration.saveTicketToFirestore(ticketData);
    
    // Also save to Telegram bot
    if (TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID && currentVerificationTicket) {
      const captionText = `🎫 NEW BONI LOTTERY ENTRY\n` +
                          `Ticket: ${generatedTicketId}\n` +
                          `Numbers: ${numbersString}\n` +
                          `Transaction: ${transId}\n` +
                          `Cost: ${totalCost} ETB`;

      const botUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`;
      const formData = new FormData();
      formData.append('chat_id', TELEGRAM_CHAT_ID);
      formData.append('photo', currentVerificationTicket);
      formData.append('caption', captionText);
      formData.append('parse_mode', 'Markdown');

      await fetch(botUrl, { method: 'POST', body: formData });
    }

    selectedNumbers = [];
    resetFileSelection(null);
    updateSelectionDrawerUI();
    generateSelectionGrid();

    showNotificationToast(`Ticket submitted! ID: ${generatedTicketId}`);

  } catch (error) {
    showNotificationToast("Failed to submit ticket: " + error.message, "error");
    console.error(error);
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = `<i class="fa-solid fa-shield-check mr-1.5"></i>Submit Verification`;
  }
}

/* Replace the old handleVerificationSubmit with this */
async function handleVerificationSubmit(event) {
  return handleVerificationSubmitUpdated(event);
}
